name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # Public GitHub Release .tgz deps — npm install resolves transitive deps (MSAL, etc.)
      - run: npm install --no-fund --no-audit
      - run: npm run build
